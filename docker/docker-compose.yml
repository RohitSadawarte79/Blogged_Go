services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rohit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: blogged
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rohit -d blogged"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      Port: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: rohit
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: blogged
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: